<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Sää</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <video src="BackgroundVideo.mp4" autoplay muted loop id="bgVideo" ></video>

  <div class="container-fluid min-vh-100 p-5 d-flex flex-column">
    
    <div id="cityButtons" class="d-flex gap-3 mb-5 justify-content-center flex-wrap w-100 mt-3">
      <button id="helsinkiBtn" class="btn btn-outline-light btn-lg px-4 rounded-pill">Helsinki, FI</button>
      <button id="turkuBtn" class="btn btn-outline-light btn-lg px-4 rounded-pill">Turku, FI</button>
      <button id="tampereBtn" class="btn btn-outline-light btn-lg px-4 rounded-pill">Tampere, FI</button>
    </div>

    <div id="weatherInfo" class="card text-white text-center p-5 rounded-4 shadow my-auto ms-4" style="max-width: 450px;">
      <h2 id="cityName" class="display-5 mb-3 text-white">Helsinki, FI</h2>
      <h1 id="temperature" class="display-1 fw-bold mb-4 text-white">--</h1>
      
      <div class="row mt-2">
        <div class="col-6 border-end border-secondary">
          <p class="text-uppercase small tracking-wider text-light opacity-75 mb-1">Humidity</p>
          <p id="humidity" class="fs-3 mb-0 text-white">--</p>
        </div>
        <div class="col-6">
          <p class="text-uppercase small tracking-wider text-light opacity-75 mb-1">Wind Speed</p>
          <p id="windSpeed" class="fs-3 mb-0 text-white">--</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
